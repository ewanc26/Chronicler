# Chronicler configuration
config-version: 1

# Master toggle.
enabled: true

# How often to publish a new newspaper.
# Options: DAILY, WEEKLY, BIWEEKLY, MONTHLY
# Or a custom interval in ticks (20 ticks = 1 second).
schedule: WEEKLY

# Day of week / time for publication (used for WEEKLY/BIWEEKLY/MONTHLY).
# 0 = Monday, 6 = Sunday. Hour in 0-23 server time.
publish-day: 0
publish-hour: 8

# Which event categories to track.
tracking:
  deaths: true
  kills: true
  pvp: true
  advancements: true
  blocks: true
  exploration: true
  social: true
  economy: true
  chat: true
  crafting: true
  fishing: true
  sleep: true
  portals: true
  entities: true
  explosions: true
  weather: true
  raids: true
  teleport: true
  consumption: true
  projectiles: true
  vehicles: true
  misc: true

# Maximum events stored per category before older ones are pruned.
event-limit: 500

# bStats metrics (anonymous usage statistics).
bstats-enabled: true

# LLM configuration for article generation.
# If disabled, falls back to template-based summaries.
# Providers: ollama, openai (works with OpenRouter, OpenAI, any OpenAI-compatible API), anthropic
llm:
  enabled: true
  provider: ollama
  model: llama3.2
  # API key for providers that require it (openai, anthropic).
  # Get one from https://openrouter.ai/keys for OpenRouter.
  api-key: ""
  # Base URL for OpenAI-compatible providers (OpenRouter, OpenAI, etc.).
  base-url: https://openrouter.ai/api/v1
  # Base URL for Ollama (only used when provider is ollama).
  ollama-url: http://localhost:11434
  timeout-seconds: 30
  # System prompt for the LLM (controls tone and style).
  # Available variables: {series_title}, {server_name}
  system-prompt: >
    You are the editor of "{series_title}", a Minecraft server newspaper.
    Write concise, vivid articles about in-game events. Use a dry, slightly
    humorous tone. Each response must be a headline (max 60 chars) followed
    by a blank line, then a 2-4 sentence article body.

# Newspaper settings.
newspaper:
  # Title prefix for each issue (issue number appended).
  title: "The Weekly Chronicle"
  # Author name on the book.
  author: "Chronicler"
  # Max stories per section (only used when LLM is disabled).
  stories-per-section: 5
  # Include raw statistics page.
  show-statistics: true

# Headline ticker — periodically broadcasts a headline from the current issue.
ticker:
  # Interval in ticks (20 ticks = 1 second). Set to 0 to disable.
  interval-ticks: 1200
  # Enable PlaceholderAPI expansion (%chronicler_*%).
  papi-enabled: true

# Web output.
web:
  enabled: true
  # Port for the embedded web server (0 to disable serving, just write files).
  port: 8080
  # Write HTML to plugin folder even when serving.
  write-files: true
